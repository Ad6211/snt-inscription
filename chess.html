<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jeu d'échecs</title>
<style>
html,body{
 background:#222;margin:0;padding:0;
 display:flex;justify-content:center;margin-top:20px;
 font-family:sans-serif;
}
#game{text-align:center}
#status{color:white;margin-bottom:10px;font-size:20px}
#board{
 display:grid;
 grid-template-columns:repeat(8,70px);
 grid-template-rows:repeat(8,70px);
}
.square{
 width:70px;height:70px;
 display:flex;justify-content:center;align-items:center;
 font-size:40px;cursor:pointer;user-select:none;
}
.white{background:#f0d9b5}
.black{background:#b58863}
.selected{outline:3px solid yellow}
.move{box-shadow: inset 0 0 0 4px rgba(0,255,0,.5)}
</style>
</head>
<body>

<div id="game">
 <div id="status">Blanc joue</div>
 <div id="board"></div>
</div>

<script>
// ================== ÉTAT ==================
let board=[
 ['br','bn','bb','bq','bk','bb','bn','br'],
 ['bp','bp','bp','bp','bp','bp','bp','bp'],
 ['','','','','','','',''],
 ['','','','','','','',''],
 ['','','','','','','',''],
 ['','','','','','','',''],
 ['wp','wp','wp','wp','wp','wp','wp','wp'],
 ['wr','wn','wb','wq','wk','wb','wn','wr']
];

let turn='w';
let selected=null;
let possibleMoves=[];
let moved={wk:false,bk:false,wr0:false,wr7:false,br0:false,br7:false};

const boardDiv=document.getElementById('board');
const statusDiv=document.getElementById('status');
const pieceValue={p:100,n:320,b:330,r:500,q:900,k:20000};

// ================== UTILS ==================
function inside(r,c){return r>=0&&r<8&&c>=0&&c<8}
function cloneBoard(b){return b.map(r=>[...r])}

function getSymbol(p){
 return {wp:'♙',bp:'♟',wr:'♖',br:'♜',wn:'♘',bn:'♞',
 wb:'♗',bb:'♝',wq:'♕',bq:'♛',wk:'♔',bk:'♚'}[p]||''
}

// ================== AFFICHAGE ==================
function draw(){
 boardDiv.innerHTML='';
 for(let r=0;r<8;r++)for(let c=0;c<8;c++){
  let sq=document.createElement('div');
  sq.className='square '+((r+c)%2?'black':'white');
  sq.dataset.r=r; sq.dataset.c=c;
  if(selected&&selected.r==r&&selected.c==c) sq.classList.add('selected');
  if(possibleMoves.some(m=>m.r==r&&m.c==c)) sq.classList.add('move');
  if(board[r][c]) sq.textContent=getSymbol(board[r][c]);
  sq.onclick=onClick;
  boardDiv.appendChild(sq);
 }
}

// ================== INTERACTION ==================
function onClick(){
 if(turn!=='w') return;
 let r=+this.dataset.r,c=+this.dataset.c,p=board[r][c];

 if(selected){
  if(possibleMoves.some(m=>m.r==r&&m.c==c)){
   move(selected.r,selected.c,r,c);
   selected=null; possibleMoves=[];
   turn='b'; updateStatus(); draw();
   setTimeout(botMove,300);
  }else if(p&&p[0]=='w') select(r,c);
  else{selected=null;possibleMoves=[];}
 }else if(p&&p[0]=='w') select(r,c);
 draw();
}

function select(r,c){
 selected={r,c};
 possibleMoves=getLegalMovesBoard(r,c,board);
}

// ================== LOGIQUE ==================
function squareAttacked(r,c,color,b){
 let enemy=color=='w'?'b':'w';
 for(let i=0;i<8;i++)for(let j=0;j<8;j++){
  if(b[i][j]&&b[i][j][0]==enemy){
   let m=getMoves(i,j,false,b,true);
   if(m.some(x=>x.r==r&&x.c==c)) return true;
  }
 }
 return false;
}

function kingInCheck(color,b){
 for(let r=0;r<8;r++)for(let c=0;c<8;c++)
  if(b[r][c]==color+'k')
   return squareAttacked(r,c,color,b);
 return false;
}

function updateStatus(){
 statusDiv.textContent=(turn=='w'?'Blanc':'Noir')+' joue';
}

// ================== MOVE ==================
function move(r,c,nr,nc){
 let p=board[r][c];
 if(p=='wk')moved.wk=true;
 if(p=='bk')moved.bk=true;
 if(p=='wr'&&c==0)moved.wr0=true;
 if(p=='wr'&&c==7)moved.wr7=true;
 if(p=='br'&&c==0)moved.br0=true;
 if(p=='br'&&c==7)moved.br7=true;

 // ROQUE
 if(p=='wk'&&Math.abs(nc-c)==2){
  if(nc==6){board[7][5]='wr';board[7][7]=''}
  if(nc==2){board[7][3]='wr';board[7][0]=''}
 }
 if(p=='bk'&&Math.abs(nc-c)==2){
  if(nc==6){board[0][5]='br';board[0][7]=''}
  if(nc==2){board[0][3]='br';board[0][0]=''}
 }

 board[nr][nc]=p; board[r][c]='';

 if(p=='wp'&&nr==0)board[nr][nc]='wq';
 if(p=='bp'&&nr==7)board[nr][nc]='bq';
}

// ================== COUPS ==================
function getLegalMovesBoard(r,c,b){
 let p=b[r][c]; if(!p)return[];
 let raw=getMoves(r,c,true,b,false),legal=[];
 for(let m of raw){
  let copy=cloneBoard(b);
  copy[m.r][m.c]=copy[r][c]; copy[r][c]='';
  if(!kingInCheck(p[0],copy)) legal.push(m);
 }
 return legal;
}

function getMoves(r,c,includeCastle,b,attackOnly){
 let p=b[r][c]; if(!p)return[];
 let color=p[0],type=p[1],moves=[],dir=color=='w'?-1:1;

 if(type=='p'){
  let nr=r+dir;
  if(!attackOnly&&inside(nr,c)&&!b[nr][c])moves.push({r:nr,c});
  if(!attackOnly&&((color=='w'&&r==6)||(color=='b'&&r==1))){
   let nr2=r+dir*2;
   if(!b[nr][c]&&!b[nr2][c])moves.push({r:nr2,c});
  }
  for(let dc of[-1,1]){
   let nc=c+dc;
   if(inside(nr,nc)&&b[nr][nc]&&b[nr][nc][0]!=color)
    moves.push({r:nr,c:nc});
  }
 }

 if(type=='n'){
  for(let[dr,dc]of[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]]){
   let nr=r+dr,nc=c+dc;
   if(inside(nr,nc)&&(!b[nr][nc]||b[nr][nc][0]!=color))
    moves.push({r:nr,c:nc});
  }
 }

 if(type=='b'||type=='q'){
  for(let[dr,dc]of[[1,1],[1,-1],[-1,1],[-1,-1]]){
   let nr=r+dr,nc=c+dc;
   while(inside(nr,nc)){
    if(!b[nr][nc])moves.push({r:nr,c:nc});
    else{if(b[nr][nc][0]!=color)moves.push({r:nr,c:nc});break}
    nr+=dr;nc+=dc;
   }
  }
 }

 if(type=='r'||type=='q'){
  for(let[dr,dc]of[[1,0],[-1,0],[0,1],[0,-1]]){
   let nr=r+dr,nc=c+dc;
   while(inside(nr,nc)){
    if(!b[nr][nc])moves.push({r:nr,c:nc});
    else{if(b[nr][nc][0]!=color)moves.push({r:nr,c:nc});break}
    nr+=dr;nc+=dc;
   }
  }
 }

 if(type=='k'){
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)
   if(dr||dc){
    let nr=r+dr,nc=c+dc;
    if(inside(nr,nc)&&(!b[nr][nc]||b[nr][nc][0]!=color))
     moves.push({r:nr,c:nc});
   }

  if(includeCastle && !attackOnly){
   if(color=='w'&&!moved.wk&&!kingInCheck('w',b)){
    if(!moved.wr7&&!b[7][5]&&!b[7][6]
      &&!squareAttacked(7,5,'w',b)&&!squareAttacked(7,6,'w',b))
      moves.push({r:7,c:6});
    if(!moved.wr0&&!b[7][1]&&!b[7][2]&&!b[7][3]
      &&!squareAttacked(7,3,'w',b)&&!squareAttacked(7,2,'w',b))
      moves.push({r:7,c:2});
   }
   if(color=='b'&&!moved.bk&&!kingInCheck('b',b)){
    if(!moved.br7&&!b[0][5]&&!b[0][6]
      &&!squareAttacked(0,5,'b',b)&&!squareAttacked(0,6,'b',b))
      moves.push({r:0,c:6});
    if(!moved.br0&&!b[0][1]&&!b[0][2]&&!b[0][3]
      &&!squareAttacked(0,3,'b',b)&&!squareAttacked(0,2,'b',b))
      moves.push({r:0,c:2});
   }
  }
 }

 return moves;
}

// ================== BOT ==================
function evaluateBoard(b){
 let s=0;
 for(let r=0;r<8;r++)for(let c=0;c<8;c++){
  let p=b[r][c]; if(!p)continue;
  let sign=p[0]=='b'?1:-1;
  s+=sign*pieceValue[p[1]];
  if((r==3||r==4)&&(c==3||c==4))s+=sign*30;
 }
 return s;
}

function minimax(b,d,isBlack){
 if(d==0)return evaluateBoard(b);
 let best=isBlack?-Infinity:Infinity;
 for(let r=0;r<8;r++)for(let c=0;c<8;c++)
  if(b[r][c]&&b[r][c][0]==(isBlack?'b':'w')){
   for(let m of getLegalMovesBoard(r,c,b)){
    let cp=cloneBoard(b);
    cp[m.r][m.c]=cp[r][c]; cp[r][c]='';
    let v=minimax(cp,d-1,!isBlack);
    best=isBlack?Math.max(best,v):Math.min(best,v);
   }
  }
 return best;
}

function botMove(){
 if(turn!='b')return;
 let best=-Infinity,bm=null;
 for(let r=0;r<8;r++)for(let c=0;c<8;c++)
  if(board[r][c]&&board[r][c][0]=='b'){
   for(let m of getLegalMovesBoard(r,c,board)){
    let cp=cloneBoard(board);
    cp[m.r][m.c]=cp[r][c]; cp[r][c]='';
    let v=minimax(cp,2,false);
    if(v>best){best=v;bm={r,c,m}}
   }
  }
 if(bm){
  move(bm.r,bm.c,bm.m.r,bm.m.c);
  turn='w'; updateStatus(); draw();
 }
}

// ================== INIT ==================
updateStatus(); draw();
</script>
</body>
</html>
